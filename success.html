<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAWNED | Order Confirmed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--black);
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .success-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .success-watermark {
      position: absolute;
      font-size: clamp(12rem, 40vw, 28rem);
      color: rgba(201,168,76,0.03);
      bottom: -4rem;
      right: -2rem;
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }
    .success-content {
      position: relative;
      z-index: 2;
      max-width: 560px;
    }
    .success-icon-large {
      font-size: 4rem;
      color: var(--gold);
      margin-bottom: 1.5rem;
      display: block;
      animation: fadeUp 0.8s 0.2s both;
    }
    .success-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      color: var(--gold);
      margin-bottom: 1rem;
      animation: fadeUp 0.8s 0.4s both;
    }
    .success-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--white);
      margin-bottom: 1.5rem;
      animation: fadeUp 0.8s 0.5s both;
    }
    .success-message {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(245,245,240,0.6);
      line-height: 1.8;
      margin-bottom: 2rem;
      animation: fadeUp 0.8s 0.6s both;
    }
    .order-summary {
      background: var(--black-2);
      border: 1px solid rgba(201,168,76,0.15);
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.8s 0.7s both;
    }
    .order-summary-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--grey);
      margin-bottom: 0.5rem;
      letter-spacing: 0.06em;
    }
    .order-row span:last-child { color: var(--white); }
    .order-divider { height: 1px; background: var(--grey-dark); margin: 0.75rem 0; }
    .order-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
    }
    .order-total-row span:last-child {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--gold);
    }
    .success-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.8s 0.8s both;
    }
    .btn-primary {
      font-family: var(--font-body);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--black);
      background: var(--gold);
      padding: 0.9rem 2rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.3s ease;
    }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-secondary {
      font-family: var(--font-body);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--grey);
      background: transparent;
      padding: 0.9rem 2rem;
      border: 1px solid var(--grey-dark);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
    }
    .btn-secondary:hover { color: var(--white); border-color: var(--white); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav scrolled" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="logo-text">PAWNED</span></a>
    <ul class="nav-links">
      <li><a href="mens.html" class="nav-link">MEN</a></li>
      <li><a href="womens.html" class="nav-link">WOMEN</a></li>
      <li><a href="index.html#manifesto" class="nav-link">MANIFESTO</a></li>
    </ul>
    <div class="nav-actions">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-close" id="mobileClose">&#10005;</button>
  <ul>
    <li><a href="mens.html" class="mobile-link">MEN</a></li>
    <li><a href="womens.html" class="mobile-link">WOMEN</a></li>
    <li><a href="index.html#manifesto" class="mobile-link">MANIFESTO</a></li>
  </ul>
  <div class="mobile-bottom"><p class="chess-quote">"From Pawn to King"</p></div>
</div>

<div class="success-page">
  <div class="success-watermark">&#9813;</div>
  <div class="success-content">
    <span class="success-icon-large">&#9817;</span>
    <p class="success-label">PAYMENT SUCCESSFUL</p>
    <h1 class="success-title">ORDER<br/>CONFIRMED</h1>
    <p class="success-message">
      Your move has been made.<br/>
      We'll have your order ready and on its way shortly.
    </p>

    <div class="order-summary" id="orderSummary">
      <p class="order-summary-label">ORDER SUMMARY</p>
      <div id="orderItems"></div>
      <div class="order-divider"></div>
      <div class="order-total-row">
        <span>TOTAL PAID</span>
        <span id="orderTotal">—</span>
      </div>
      <div style="margin-top:1rem;">
        <div class="order-row">
          <span>ORDER REF</span>
          <span id="orderRef">—</span>
        </div>
      </div>
    </div>

    <div class="success-actions">
      <a href="mens.html" class="btn-primary">CONTINUE SHOPPING</a>
      <a href="index.html" class="btn-secondary">HOME</a>
    </div>
  </div>
</div>

<script src="main.js"></script>
<script>
  /* Load last order from localStorage */
  try {
    const order = JSON.parse(localStorage.getItem('pawned_last_order') || '{}');
    if (order.orderNumber) {
      document.getElementById('orderRef').textContent = order.orderNumber;
    }
    if (order.total) {
      document.getElementById('orderTotal').textContent = 'R' + Number(order.total).toLocaleString('en-ZA', { minimumFractionDigits: 2 });
    }
    if (order.items && order.items.length) {
      const container = document.getElementById('orderItems');
      order.items.forEach(function(item) {
        const row = document.createElement('div');
        row.className = 'order-row';
        row.innerHTML = '<span>' + item.qty + 'x ' + item.name + '</span><span>R' + (item.price * item.qty).toLocaleString('en-ZA', { minimumFractionDigits: 2 }) + '</span>';
        container.appendChild(row);
      });
    }
    /* Clear after displaying */
    localStorage.removeItem('pawned_last_order');
  } catch(e) {}
</script>
</body>
</html>
